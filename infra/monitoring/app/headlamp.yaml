---
# Read-only cluster UI: SA bound to `view`, never cluster-admin.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  releaseName: headlamp
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: headlamp
      version: "0.43.*" # pin a patch for reproducibility
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  # The pluginsManager sidecar is musl (node:lts-alpine): under ndots:5 it can't resolve
  # registry.npmjs.org, crashloops, and wedges the rollout at 1/2 Not Ready. The chart has no
  # dnsConfig passthrough, so ndots:1 goes in by postRenderer.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              - op: add
                path: /spec/template/spec/dnsConfig
                value:
                  options:
                    - name: ndots
                      value: "1"
  values:
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    serviceAccount:
      create: true
    # NOT the chart default, which is cluster-admin.
    clusterRoleBinding:
      create: true
      clusterRoleName: view
    config:
      unsafeUseServiceAccountToken: true
      watchPlugins: true
    pluginsManager:
      enabled: true
      # Otherwise renders with no resources at all. Headroom is for `npx pluginctl` npm installs.
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.1
        installOptions:
          parallel: true
          maxConcurrent: 2
    # No Authelia middleware yet — infra/auth (SSO) hasn't landed.
    ingress:
      enabled: true
      ingressClassName: internal
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - host: headlamp.INT_DOMAIN
          paths:
            - path: /
              type: Prefix
---
# The built-in `view` role excludes cluster-scoped `nodes`, so Headlamp's Nodes page and node
# CPU/memory charts render blank. Grant read-only `nodes` — additive to the chart-created SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-nodes-view
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-nodes-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp-nodes-view
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: monitoring
