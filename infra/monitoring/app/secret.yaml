---
# admin-user/admin-password (Grafana admin.existingSecret) plus SLACK_WEBHOOK_URL/
# HEALTHCHECKS_PING_URL (envFromSecret, consumed by grafana.yaml's alerting contact points).
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: grafana
  namespace: monitoring
spec:
  infisicalAuthRef:
    name: infisical
    namespace: infisical-operator
  sources:
    - projectId: ${INFISICAL_PROJECT_ID}
      environmentSlug: prod
      secretPath: /monitoring/grafana
  syncOptions:
    refreshInterval: 1m
    instantUpdates: true
  targets:
    - kind: Secret
      name: grafana
      namespace: monitoring
      creationPolicy: Owner
