---
# admin-user/admin-password (Grafana admin.existingSecret) plus SLACK_WEBHOOK_URL/
# HEALTHCHECKS_PING_URL (envFromSecret, consumed by grafana.yaml's alerting contact points).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
  namespace: monitoring
spec:
  secretStoreRef:
    name: bao-infra
    kind: ClusterSecretStore
  target:
    name: grafana
    namespace: monitoring
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: monitoring/grafana
