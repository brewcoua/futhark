---
# Bunny.net API token for the DNS-01 webhook solver. Synced from OpenBao's infra namespace via
# infra/external-secrets/app/clustersecretstore-infra.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bunny-api
  namespace: cert-manager
spec:
  secretStoreRef:
    name: bao-infra
    kind: ClusterSecretStore
  target:
    name: bunny-api
    namespace: cert-manager
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: cert-manager/bunny
