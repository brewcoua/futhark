---
# Bunny.net API token for the DNS-01 webhook solver. Synced from Infisical via the shared
# connection/auth in infra/infisical-operator/app/{connection,auth}.yaml.
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: bunny-api
  namespace: cert-manager
spec:
  infisicalAuthRef:
    name: infisical
    namespace: infisical-operator
  sources:
    - projectId: ${INFISICAL_PROJECT_ID}
      environmentSlug: prod
      secretPath: /infra/cert-manager/bunny
  syncOptions:
    refreshInterval: 1m
    instantUpdates: true
  targets:
    - kind: Secret
      name: bunny-api
      namespace: cert-manager
      creationPolicy: Owner
