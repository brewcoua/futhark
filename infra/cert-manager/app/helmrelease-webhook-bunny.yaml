---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-bunny
  namespace: flux-system
spec:
  interval: 1h
  releaseName: cert-manager-webhook-bunny
  targetNamespace: cert-manager
  dependsOn:
    - name: cert-manager
  chart:
    spec:
      chart: cert-manager-webhook-bunny
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-webhook-bunny
        namespace: flux-system
  # The chart sets neither app.kubernetes.io/name nor a securityContext on its Deployment;
  # inject both via postRenderer (stateless TLS server: /tls read-only, /tmp emptyDir).
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: cert-manager-webhook-bunny
                labels:
                  app.kubernetes.io/name: cert-manager-webhook-bunny
              spec:
                template:
                  spec:
                    securityContext:
                      seccompProfile:
                        type: RuntimeDefault
                    containers:
                      - name: cert-manager-webhook-bunny
                        securityContext:
                          readOnlyRootFilesystem: true
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop: [ALL]
                        volumeMounts:
                          - name: tmp
                            mountPath: /tmp
                    volumes:
                      - name: tmp
                        emptyDir: {}
  values:
    # Must match solvers[].dns01.webhook.groupName in the ClusterIssuer.
    groupName: com.bunny.webhook
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { cpu: 100m, memory: 128Mi }
