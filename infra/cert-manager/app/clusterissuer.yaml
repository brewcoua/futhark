---
# Let's Encrypt issuer that solves DNS-01 via the Bunny.net webhook. Works for internal-only
# hosts too because validation happens in DNS, not over HTTP.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-bunny
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: contact@futk.eu
    privateKeySecretRef:
      name: letsencrypt-bunny-account
    solvers:
      - dns01:
          webhook:
            groupName: com.bunny.webhook
            solverName: bunny
            config:
              secretRef: bunny-api
              secretNamespace: cert-manager
