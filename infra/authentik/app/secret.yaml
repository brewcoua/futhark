---
# yaml-language-server: $schema=https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/crds/bundle.yaml
#
# `core` holds authentik's own runtime config (secret_key, postgres/redis passwords, bootstrap
# creds). `app-clients` holds one <APP>_CLIENT_ID/<APP>_CLIENT_SECRET pair per onboarded app —
# the *same* OpenBao key an app's own ExternalSecret reads its OIDC client config from, so a
# blueprint's `!Env <APP>_CLIENT_SECRET` and the app's own secret are always the same value.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  secretStoreRef:
    name: bao-infra
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    namespace: authentik
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik/core
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-app-secrets
  namespace: authentik
spec:
  secretStoreRef:
    name: bao-infra
    kind: ClusterSecretStore
  target:
    name: authentik-app-secrets
    namespace: authentik
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: authentik/app-clients
