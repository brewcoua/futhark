---
# Dedicated cert for the public auth.DOMAIN host — unlike traefik-internal, traefik-edge has no
# default wildcard certificate (it's still unused by any other app), so this app carries its own.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-tls
  namespace: authentik
spec:
  secretName: authentik-tls
  issuerRef:
    name: letsencrypt-bunny
    kind: ClusterIssuer
  commonName: "auth.DOMAIN"
  dnsNames:
    - "auth.DOMAIN"
