---
# yaml-language-server: $schema=https://raw.githubusercontent.com/Infisical/infisical/main/k8-operator/config/crd/bases/secrets.infisical.com_infisicalstaticsecrets.yaml
#
# `core` holds authentik's own runtime config (secret_key, postgres/redis passwords, bootstrap
# creds). `app-clients` holds one <APP>_CLIENT_ID/<APP>_CLIENT_SECRET pair per onboarded app —
# the *same* Infisical path an app's own InfisicalStaticSecret reads its OIDC client config from,
# so a blueprint's `!Env <APP>_CLIENT_SECRET` and the app's own secret are always the same value.
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  infisicalAuthRef:
    name: infisical
    namespace: infisical-operator
  sources:
    - projectId: PROJECT_ID
      environmentSlug: prod
      secretPath: /infra/authentik/core
  syncOptions:
    refreshInterval: 1m
    instantUpdates: true
  targets:
    - kind: Secret
      name: authentik-secrets
      namespace: authentik
      creationPolicy: Owner
---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: authentik-app-secrets
  namespace: authentik
spec:
  infisicalAuthRef:
    name: infisical
    namespace: infisical-operator
  sources:
    - projectId: PROJECT_ID
      environmentSlug: prod
      secretPath: /infra/authentik/app-clients
  syncOptions:
    refreshInterval: 1m
    instantUpdates: true
  targets:
    - kind: Secret
      name: authentik-app-secrets
      namespace: authentik
      creationPolicy: Owner
