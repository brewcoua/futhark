---
# yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik/v3.7/docs/content/reference/routing-configuration/kubernetes/crd/traefik.io_middlewares.yaml
#
# Any protected app's IngressRoute/Ingress adds a reference to this Middleware to gate the route
# behind Authentik — see README.md. traefik-internal already sets allowCrossNamespace: true, so
# apps in any namespace can reference authentik-authentik@kubernetescrd.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik
  namespace: authentik
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
