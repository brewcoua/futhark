---
# Points the operator at Infisical Cloud. Field names per the v1beta1 API
# (InfisicalConnection/InfisicalAuth split) — verify against the installed CRD schema
# (infisical/kubernetes-operator) before applying; the operator registers its own CRDs
# on install, so this can only be validated once helmrelease.yaml has actually reconciled.
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalConnection
metadata:
  name: infisical
  namespace: infisical-operator
spec:
  hostAPI: https://eu.infisical.com/api
