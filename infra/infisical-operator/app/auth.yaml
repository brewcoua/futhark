---
# Universal Auth via the machine identity Ansible bridges into
# infisical-operator/infisical-machine-identity (clientId/clientSecret keys) — see
# ansible/roles/flux_bootstrap. Field names need the same verification as connection.yaml.
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalAuth
metadata:
  name: infisical
  namespace: infisical-operator
spec:
  connectionRef:
    name: infisical
  universalAuth:
    secretsRef:
      secretName: infisical-machine-identity
