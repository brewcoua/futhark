---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
# Reusable Kustomize Component: generates a `infisical` ConfigMap (PROJECT_ID) from project.env,
# the single source of truth for this cluster's Infisical project id — not a secret (same class as
# infra/_components/domain), just an identifier repeated by every InfisicalStaticSecret. Any
# InfisicalStaticSecret adds `components: [.../_components/infisical]` plus a `replacements` block
# splicing PROJECT_ID into `spec.sources.N.projectId` — see infra/authentik/app/kustomization.yaml.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
configMapGenerator:
  - name: infisical
    envs:
      - project.env
generatorOptions:
  disableNameSuffixHash: true
