---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: storagebox-secret
  namespace: csi-rclone
spec:
  secretStoreRef:
    name: bao-infra
    kind: ClusterSecretStore
  target:
    name: storagebox-secret
    namespace: csi-rclone
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: csi-rclone/storagebox
