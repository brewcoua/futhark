---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd/flux2/main/manifests/bases/crds/kustomize.toolkit.fluxcd.io_kustomizations.yaml
# Split from ks.yaml: the ClusterSecretStores here need the external-secrets CRDs to already
# exist, which the external-secrets Kustomization can't guarantee for itself (chicken-and-egg
# on first apply).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infra/external-secrets/config
  dependsOn:
    - name: external-secrets
