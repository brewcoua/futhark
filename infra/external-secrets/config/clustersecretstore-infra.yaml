---
# yaml-language-server: $schema=https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/crds/bundle.yaml
#
# server: REPLACE_WITH_OGMA_MESH_ADDR — ogma's Tailscale MagicDNS name or mesh IP, same kind of
# placeholder as infra/traefik-internal/app/helmrelease.yaml's REPLACE_WITH_MESH_IP. Pod DNS
# doesn't resolve MagicDNS names by default; either use ogma's stable 100.64.0.0/10 mesh IP
# directly, or point CoreDNS's *.ts.net stub zone at 100.100.100.100 (Tailscale's resolver) —
# not built here, verify against current Tailscale k8s docs before choosing.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bao-infra
spec:
  provider:
    vault:
      server: https://REPLACE_WITH_OGMA_MESH_ADDR:8200
      namespace: infra
      path: secret
      version: v2
      caProvider:
        type: ConfigMap
        name: openbao-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
