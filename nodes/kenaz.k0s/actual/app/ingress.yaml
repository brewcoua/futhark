---
# Internal-only: routed by traefik-internal (mesh interface). TLS served from its default
# *.INT_DOMAIN wildcard cert, so no per-app Certificate/Secret needed here.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: actual
  namespace: actual
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: internal
  rules:
    - host: actual.INT_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: actual
                port:
                  number: 80
