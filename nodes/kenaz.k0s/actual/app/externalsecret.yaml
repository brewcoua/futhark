---
# ACTUAL_OPENID_CLIENT_SECRET, minted by tofu/oidc's pocketid_client.actual and written to
# OpenBao (node-kenaz namespace, secret/actual) by the same apply — see tofu/oidc/README.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actual
  namespace: actual
spec:
  secretStoreRef:
    name: bao-node-kenaz
    kind: ClusterSecretStore
  target:
    name: actual-secrets
    namespace: actual
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: actual
