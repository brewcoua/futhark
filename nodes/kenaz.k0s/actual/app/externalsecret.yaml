---
# ACTUAL_OPENID_CLIENT_SECRET, written by hand to OpenBao (node-kenaz namespace, secret/actual)
# after manually registering the "actual" OIDC client in the Pocket ID admin UI — see
# nodes/kenaz.k0s/actual/README.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actual
  namespace: actual
spec:
  secretStoreRef:
    name: bao-node-kenaz
    kind: ClusterSecretStore
  target:
    name: actual-secrets
    namespace: actual
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: actual
