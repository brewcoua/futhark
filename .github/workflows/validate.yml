---
name: validate
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - uses: opentofu/setup-opentofu@v2.0.2
      - uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv tool install pre-commit
      # tofu-validate (in .pre-commit-config.yaml) only runs fmt/validate, not init — init can
      # touch .terraform.lock.hcl, and pre-commit fails a hook that modifies tracked files.
      - run: for d in $(find tofu -name "*.tf" -exec dirname {} \; | sort -u); do tofu -chdir="$d" init -backend=false -input=false; done
      - run: pre-commit run --all-files

  ansible-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - run: uv tool install ansible-core
      - uses: actions/cache@v6
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('ansible/requirements.yml') }}
      - run: ansible-galaxy collection install -r requirements.yml
        working-directory: ansible
      - run: ansible-playbook --syntax-check playbooks/*.yml
        working-directory: ansible
