# Shared defaults for every node. Per-node overrides live in
# ansible/nodes/<host>/host.yml under the `node:` key.

# Resolved from the Proton Pass vault `futharkd`, item `ssh-ops`, fields
# `username`/`public-key` — see ansible/plugins/lookup/protonpass.py.
admin:
  user: "{{ lookup('protonpass', 'pass://futharkd/ssh-ops/username') }}"
  ssh_pubkey: "{{ lookup('protonpass', 'pass://futharkd/ssh-ops/public key') }}"

ssh_port: 2222

# Repo-relative paths used by cluster-provisioning roles (k0s_cluster, flux_bootstrap)
# to render and read artifacts that never get committed — see .gitignore. playbook_dir,
# not inventory_dir: those roles run against hosts: localhost (implicit, not in
# inventory), which has no inventory_dir; playbook_dir is play-scoped, not host-scoped.
repo_root: "{{ playbook_dir }}/../.."
generated_dir: "{{ repo_root }}/ansible/.generated"

# Same source of truth as infra/_components/domain/domain.env (Kustomize's DOMAIN/INT_DOMAIN,
# used across Flux-managed apps) — read straight from that file so ansible and k8s never drift.
domain_env_file: "{{ lookup('ansible.builtin.file', repo_root + '/infra/_components/domain/domain.env') }}"
domain: "{{ (domain_env_file | regex_findall('^DOMAIN=(.*)$', multiline=True))[0] }}"
int_domain: "{{ (domain_env_file | regex_findall('^INT_DOMAIN=(.*)$', multiline=True))[0] }}"
