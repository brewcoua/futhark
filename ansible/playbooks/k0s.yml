---
# k0s cluster + Flux bootstrap. Runs after setup.yml. Fleet-wide, not per-host: one
# k0sctl apply converges every workflow: k0s node in inventory at once.
- name: Provision k0s cluster
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - role: k0s_cluster

- name: Bootstrap Flux
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - role: flux_bootstrap
