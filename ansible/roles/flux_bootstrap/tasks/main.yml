---
# Talks to the cluster over the network via the k0sctl-fetched kubeconfig — no SSH,
# no become, this isn't executing "on" a node.
- name: Install the Flux Operator
  kubernetes.core.helm:
    name: flux-operator
    chart_ref: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    release_namespace: flux-system
    create_namespace: true
    kubeconfig: "{{ generated_dir }}/kubeconfig"

- name: Fetch GitHub's SSH host key
  ansible.builtin.command:
    cmd: ssh-keyscan github.com
  register: flux_bootstrap_known_hosts
  changed_when: false

- name: Bridge the Flux git deploy key
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: git-deploy-key
        namespace: flux-system
      type: Opaque
      stringData:
        identity: "{{ lookup('protonpass', 'pass://futharkd/kenaz/flux-deploy-key') }}"
        known_hosts: "{{ flux_bootstrap_known_hosts.stdout }}"

- name: Ensure the infisical-operator namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: infisical-operator

- name: Bridge the infra Infisical machine identity
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: infisical-machine-identity
        namespace: infisical-operator
      type: Opaque
      stringData:
        clientId: "{{ lookup('protonpass', 'pass://futharkd/infisical/client-id') }}"
        clientSecret: "{{ lookup('protonpass', 'pass://futharkd/infisical/client-secret') }}"

# One identity per k0s node, scoped in Infisical to /nodes/<hostname>/** only — see
# infra/infisical-operator/README.md. Loop mirrors the same workflow filter
# ansible/roles/k0s_cluster/templates/k0sctl.yaml.j2 uses.
- name: Bridge each node's own Infisical machine identity
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "infisical-machine-identity-{{ item }}"
        namespace: infisical-operator
      type: Opaque
      stringData:
        clientId: "{{ lookup('protonpass', 'pass://futharkd/' + item + '/infisical-client-id') }}"
        clientSecret: "{{ lookup('protonpass', 'pass://futharkd/' + item + '/infisical-client-secret') }}"
  loop: "{{ groups['all'] | map('extract', hostvars) | selectattr('node.workflow', 'equalto', 'k0s') | map(attribute='node.hostname') | list }}"

- name: Bridge the Infisical project ID
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: infisical-project-vars
        namespace: flux-system
      type: Opaque
      stringData:
        INFISICAL_PROJECT_ID: "{{ lookup('protonpass', 'pass://futharkd/infisical/project id') }}"

- name: Wait for the Flux Operator to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    kind: Pod
    namespace: flux-system
    label_selectors:
      - app.kubernetes.io/name=flux-operator
  register: flux_bootstrap_operator_pods
  until: flux_bootstrap_operator_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
  retries: 30
  delay: 10

- name: Apply the FluxInstance
  kubernetes.core.k8s:
    kubeconfig: "{{ generated_dir }}/kubeconfig"
    state: present
    src: "{{ repo_root }}/flux/cluster.yaml"
