---
# Generic Tailscale mesh join. Gated by node.mesh in playbooks/setup.yml — nothing in here
# branches on hostname or workflow, so any future node opts in just by setting node.mesh: true.
- name: Install the Tailscale repo
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/fedora/tailscale.repo
    dest: /etc/yum.repos.d/tailscale.repo
    mode: "0644"
  when: node.os == 'fedora'

- name: Install tailscale
  ansible.builtin.dnf:
    name: tailscale
    state: present
  when: node.os == 'fedora'

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Check current Tailscale status
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Get an OAuth access token scoped to auth-key creation
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/oauth/token
    method: POST
    body_format: form-urlencoded
    body:
      client_id: "{{ lookup('protonpass', 'pass://futharkd/tailscale/client id') }}"
      client_secret: "{{ lookup('protonpass', 'pass://futharkd/tailscale/client secret') }}"
    status_code: 200
  register: tailscale_oauth_token
  no_log: true
  when: >-
    tailscale_status.rc != 0 or
    (tailscale_status.stdout | from_json).BackendState != 'Running'

# Single-use, tag-scoped, short-lived — minted fresh for this join instead of reading a
# standing reusable authkey out of Proton Pass.
- name: Mint a single-use auth key
  ansible.builtin.uri:
    url: https://api.tailscale.com/api/v2/tailnet/-/keys
    method: POST
    headers:
      Authorization: "Bearer {{ tailscale_oauth_token.json.access_token }}"
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: false
            ephemeral: false
            preauthorized: true
            tags: ["tag:futhark-node"]
      expirySeconds: 300
    status_code: 200
  register: tailscale_authkey
  no_log: true
  when: tailscale_oauth_token is not skipped

- name: Join the tailnet
  ansible.builtin.command:
    cmd: >
      tailscale up
      --authkey={{ tailscale_authkey.json.key }}
      --advertise-tags=tag:futhark-node
      --ssh
  when: tailscale_authkey is not skipped
  changed_when: true
  no_log: true

# Bind tailscale0 to firewalld's built-in "trusted" zone: the tailnet is the mesh's own
# trust boundary (see host.yml's mesh_ip comment), so anything a node binds to its mesh_ip
# (k0s's API server, OpenBao, ...) is reachable over it without punching per-port holes in
# the public zone (ens3), which stays limited to the hardened SSH port.
- name: Put tailscale0 in firewalld's trusted zone
  ansible.posix.firewalld:
    zone: trusted
    interface: tailscale0
    permanent: true
    immediate: true
    state: enabled
  when: node.os == 'fedora'
