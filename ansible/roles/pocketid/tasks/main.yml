---
# Runs only against the already-running pocketid container deployed by gitops_pull — never
# templates a container unit itself. apps-gated ('pocketid' in node.apps), not workflow-gated,
# so this only ever touches ogma today without hardcoding its hostname. Traefik (which fronts
# this container) is provisioned separately by ansible/roles/traefik — shared edge infra, not
# pocketid-specific.
- name:
    Ensure Pocket ID's secrets directory exists (group 1000 — the image entrypoint's default
    PUID/PGID, which it su-exec's into before ever reading the encryption key, needs to
    traverse this directory)
  ansible.builtin.file:
    path: /etc/pocketid
    state: directory
    owner: root
    group: "1000"
    mode: "0750"

- name: Check for an existing Pocket ID encryption key
  ansible.builtin.stat:
    path: /etc/pocketid/encryption_key
  register: pocketid_encryption_key

- name: Generate the Pocket ID encryption key (persisted on disk, never git-synced)
  ansible.builtin.shell:
    cmd: openssl rand -base64 32 > /etc/pocketid/encryption_key
  when: not pocketid_encryption_key.stat.exists
  changed_when: true

- name: Restrict the encryption key's permissions (group-readable by the image's PUID/PGID, 1000)
  ansible.builtin.file:
    path: /etc/pocketid/encryption_key
    owner: root
    group: "1000"
    mode: "0640"

- name: Write the MaxMind license key (used for Pocket ID's GeoIP lookups)
  ansible.builtin.copy:
    dest: /etc/pocketid/maxmind_license_key
    content: "{{ lookup('protonpass', 'pass://futharkd/pocketid/license key') }}"
    owner: root
    group: "1000"
    mode: "0640"
  no_log: true

- name: Ensure Traefik's secrets directory exists
  ansible.builtin.file:
    path: /etc/traefik
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Write Traefik's env file (Bunny API key, for DNS-01 — same key tofu/bunny already uses)
  ansible.builtin.copy:
    dest: /etc/traefik/env
    content: |
      BUNNY_API_KEY={{ lookup('protonpass', 'pass://futharkd/bunny/api key') }}
    owner: root
    group: root
    mode: "0600"
  notify: Restart Traefik to pick up the env file
  no_log: true
