---
# Host-level TLS prep, run early (before gitops_pull) — see main.yml's header comment for why.
- name: Get this node's Tailscale mesh IP
  ansible.builtin.command:
    cmd: tailscale ip -4
  register: openbao_mesh_ip
  changed_when: false
  failed_when: false

- name: Assert the mesh is actually present
  ansible.builtin.assert:
    that: openbao_mesh_ip.rc == 0
    fail_msg: >-
      ogma has no Tailscale mesh IP — openbao needs node.mesh: true
      (see ansible/roles/tailscale) to run before this role in the play.

- name:
    Ensure the TLS directory exists (group 1000 — the openbao image's non-root user, gid 1000,
    same on the host since the container isn't userns-mapped, needs to traverse this directory)
  ansible.builtin.file:
    path: /etc/openbao/tls
    state: directory
    owner: root
    group: "1000"
    mode: "0750"

- name: Check for an existing TLS key
  ansible.builtin.stat:
    path: /etc/openbao/tls/openbao.key
  register: openbao_tls_key

- name: Generate the OpenBao self-signed TLS cert/key
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -newkey
      - rsa:4096
      - -nodes
      - -keyout
      - /etc/openbao/tls/openbao.key
      - -out
      - /etc/openbao/tls/openbao.crt
      - -days
      - "3650"
      - -subj
      - /CN=ogma
      - -addext
      - >-
        subjectAltName=DNS:ogma,DNS:vault.{{ int_domain }},DNS:localhost,
        IP:{{ openbao_mesh_ip.stdout }},IP:127.0.0.1
  when: not openbao_tls_key.stat.exists
  changed_when: true

- name: Restrict TLS key permissions (group-readable by the openbao image's uid, gid 1000)
  ansible.builtin.file:
    path: /etc/openbao/tls/openbao.key
    owner: root
    group: "1000"
    mode: "0640"

- name: Read the self-signed cert (public, non-secret) so ESO can trust it
  ansible.builtin.slurp:
    src: /etc/openbao/tls/openbao.crt
  register: openbao_ca_cert
