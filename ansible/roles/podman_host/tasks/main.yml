---
# Generic podman-host plumbing, workflow: podman-gated only — app-agnostic, doesn't know or
# care what quadlets eventually land here.
- name: Install podman
  ansible.builtin.dnf:
    name: podman
    state: present

- name: Install gettext (envsubst — gitops_pull renders tailnet-bound values into config/)
  ansible.builtin.dnf:
    name: gettext
    state: present

- name: Enable the rootful podman API socket (bind-mounted by containers that need it, e.g. Traefik)
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true

- name: Ensure /etc/containers/systemd exists
  ansible.builtin.file:
    path: /etc/containers/systemd
    state: directory
    mode: "0755"

- name: Create the gitops-pull service user
  ansible.builtin.user:
    name: futhark-gitops
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Ensure the gitops-pull clone directory exists
  ansible.builtin.file:
    path: /var/lib/futhark-gitops
    state: directory
    owner: futhark-gitops
    group: futhark-gitops
    mode: "0750"
