---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  ANSIBLE_DIR: "{{.ROOT_DIR}}/ansible"

tasks:
  setup:
    desc: Fully set up this machine as a futhark operator (packages + collections + hooks + tofu)
    cmds:
      - task: deps
      - task: collections
      - task: hooks
      - task: ":tf:init"

  deps:
    desc: >-
      Install required packages (ansible-core, ansible-lint, yamllint, pass-cli,
      pre-commit, kubectl, helm, kustomize, k0sctl, tofu)
    cmds:
      # opentofu (dnf) provides /usr/bin/tofu — the upstream install-opentofu.sh's rpm method
      # ships a same-path conflicting package literally named `tofu`, don't use it here.
      - sudo dnf install -y ansible-core yamllint kubernetes-client helm opentofu
      - uv tool install --upgrade ansible-lint
      - uv tool install --upgrade pre-commit
      # kubernetes.core's modules (flux_bootstrap, openbao's namespace bootstrap) import this
      # library directly, not the kubectl binary above — installed into /usr/bin/python3's
      # site-packages since that's the interpreter ansible-core actually runs modules with,
      # not a uv tool's isolated venv.
      - sudo uv pip install --python /usr/bin/python3 kubernetes
      - curl -fsSL https://proton.me/download/pass-cli/install.sh | bash
      # The installer script refuses to run if the binary already exists, so ops:setup can be rerun.
      - command -v kustomize > /dev/null || curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | sudo bash -s -- /usr/local/bin
      - curl -fsSL https://github.com/k0sproject/k0sctl/releases/latest/download/k0sctl-linux-amd64 -o /tmp/k0sctl && sudo install -m 755 /tmp/k0sctl /usr/local/bin/k0sctl
    preconditions:
      - which dnf
      - which uv

  hooks:
    desc: Install the repo's pre-commit hooks
    dir: "{{.ROOT_DIR}}"
    cmd: pre-commit install

  collections:
    desc: Install the Ansible collections futhark's roles depend on
    dir: "{{.ANSIBLE_DIR}}"
    cmd: ansible-galaxy collection install -r requirements.yml
