---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  TOFU_DIR: "{{.ROOT_DIR}}/tofu"
  ANSIBLE_DIR: "{{.ROOT_DIR}}/ansible"

tasks:
  init:
    desc: "Init tofu module(s) [-- <module>] (no secrets needed: provider download only)"
    dir: "{{.ROOT_DIR}}"
    cmd: |
      for d in {{if .CLI_ARGS}}tofu/{{.CLI_ARGS}}{{else}}$(find tofu -mindepth 1 -maxdepth 1 -type d){{end}}; do
        (cd "$d" && tofu init -input=false)
      done

  plan:
    desc: "Plan a tofu module -- <module>"
    dir: "{{.TOFU_DIR}}/{{.CLI_ARGS}}"
    cmd: pass-cli run --env-file secrets.env -- tofu plan

  apply:
    desc: "Apply a tofu module -- <module>"
    dir: "{{.TOFU_DIR}}/{{.CLI_ARGS}}"
    cmd: pass-cli run --env-file secrets.env -- tofu apply

  validate:
    desc: "Validate a tofu module -- <module>"
    dir: "{{.TOFU_DIR}}/{{.CLI_ARGS}}"
    cmd: tofu validate

  oidc-ca:
    desc: Fetch OpenBao's CA cert from ogma straight into tofu/oidc (bypasses Proton Pass)
    dir: "{{.ANSIBLE_DIR}}"
    cmd: >-
      ansible ogma -b -m fetch
      -a "src=/etc/openbao/tls/openbao.crt dest={{.TOFU_DIR}}/oidc/openbao-ca.crt flat=yes"
