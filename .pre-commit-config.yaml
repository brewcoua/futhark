---
fail_fast: false
default_language_version:
  python: python3
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.9.6
    hooks:
      - id: prettier
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c
          - ".yamllint.yml"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-crlf
      - id: forbid-tabs
  - repo: https://github.com/sirosen/fix-smartquotes
    rev: 0.2.0
    hooks:
      - id: fix-smartquotes
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.6.0
    hooks:
      - id: ansible-lint
        entry: bash -c 'cd ansible && ansible-galaxy collection install -r requirements.yml && ansible-lint'
        files: ^ansible/
        pass_filenames: false
        language_version: python3
        # Upstream's own hook manifest sets always_run: true, which overrides `files:` above
        # unless cleared here — without this, ansible-lint runs on every commit regardless.
        always_run: false
  - repo: local
    hooks:
      - id: kustomize-build
        name: kustomize build
        entry: bash -c 'for d in $(find flux infra nodes -name kustomization.yaml -exec dirname {} \;); do kustomize build --enable-helm "$d" > /dev/null || exit 1; done'
        language: system
        files: ^(flux|infra|nodes)/.*\.ya?ml$
        pass_filenames: false
      - id: tofu-validate
        name: tofu validate
        # No `tofu init` here: it can touch .terraform.lock.hcl, and pre-commit treats a hook
        # editing tracked files as a failure. CI runs init as its own step first (see
        # .github/workflows/validate.yml); locally, run `task tofu:init -- <module>` once first.
        entry: bash -c 'for d in $(find tofu -name "*.tf" -exec dirname {} \; | sort -u); do tofu -chdir="$d" fmt -check -diff || exit 1; tofu -chdir="$d" validate || exit 1; done'
        language: system
        files: ^tofu/.*\.tf$
        pass_filenames: false
